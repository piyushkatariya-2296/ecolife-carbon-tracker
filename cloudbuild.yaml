steps:
  # 1. Build the container image on Google Cloud Build
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/ecolife-app:latest',
      '-t', 'gcr.io/$PROJECT_ID/ecolife-app:$COMMIT_SHA',
      '.'
    ]

  # 2. Push the built container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ecolife-app:latest']

  # 3. Deploy the container image to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ecolife-app'
      - '--image'
      - 'gcr.io/$PROJECT_ID/ecolife-app:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/ecolife-app:latest'
  - 'gcr.io/$PROJECT_ID/ecolife-app:$COMMIT_SHA'
